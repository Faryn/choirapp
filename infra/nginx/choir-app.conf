# Nginx static deployment profile for the choir app.
# Replace server_name/root as needed, then symlink into sites-enabled.
server {
    listen 80;
    server_name choir.example.local;

    root /home/paul/.openclaw/workspace/choir-app/web;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Keep shell + manifests revalidated so new repertoire/waveform metadata appears quickly.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /repertoire.json {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location /waveforms/ {
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    # Audio URLs are requested with ?v=<mtime-size fingerprint>, so they can be cached aggressively.
    location ~* \.(?:mp3|m4a)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri $uri/ /index.html;
    }
}
